[pytest]
# R-10 (revisione 07/2026) — sblocca la suite:
#  - testpaths=tests: raccoglie SOLO da tests/, esclude i vecchi script
#    standalone test_*.py a root (uno fa sys.exit all'import → crashava la
#    collection; altri collidono di basename con tests/). I file root NON sono
#    cancellati, solo esclusi dalla suite.
#  - import-mode=importlib: consente basename uguali in dir diverse dentro
#    tests/ (es. tests/tasks/test_orchestrator.py e tests/unit/test_orchestrator.py).
testpaths = tests
# --ignore test_device.py: OBSOLETO — testa un'API rimossa da core/device.py
# (TapCall/SwipeCall/MuMuDevice/KeyCall + attributi tap_calls/swipe_calls),
# refactorata. Non un import stale isolato: va RISCRITTO sull'API attuale di
# FakeDevice (taps/calls/key_calls). Escluso, non cancellato — TODO riscrittura
# (R-10 revisione 07/2026, tracciato in docs/revisione_bot_2026-07.md).
addopts = --import-mode=importlib --ignore=tests/unit/test_device.py
markers =
    asyncio: test asincroni (marker registrato per silenziare i warning legacy)
