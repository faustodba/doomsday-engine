<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Doomsday V6{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/htmx.min.js" defer></script>
</head>
<body>
<div class="layout">

  <!-- TOPBAR -->
  <header class="topbar">
    <span class="topbar-logo">⬡ DOOMSDAY V6</span>
    <nav class="topbar-nav">
      <a href="/ui" class="{% if active=='home' %}active{% endif %}">home</a>
      <a href="/ui/config" class="{% if active=='config' %}active{% endif %}">config</a>
      <a href="/ui/config/global" class="{% if active=='global' %}active{% endif %}">global cfg</a>
      <a href="/docs" target="_blank">api</a>
    </nav>
    <div class="topbar-counters"
         hx-get="/ui/partial/status-inline"
         hx-trigger="load, every 5s"
         hx-swap="innerHTML">
      <span class="cnt">stato <b>—</b></span>
    </div>
  </header>

  <div class="rbar"><div class="rbar-inner"></div></div>

  <!-- MAIN -->
  <main class="main">
    {% block content %}{% endblock %}
  </main>

</div>
</body>
</html>
