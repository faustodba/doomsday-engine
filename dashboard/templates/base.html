<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Doomsday V6{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/htmx.min.js" defer></script>
</head>
<body>
<div class="layout">

  <!-- TOPBAR -->
  <header class="topbar">
    <span class="topbar-title">⬡ DOOMSDAY V6</span>
    <nav class="topbar-nav" style="display:flex;gap:4px">
      <a href="/ui" class="{% if active=='overview' %}active{% endif %}">overview</a>
      <a href="/ui/config" class="{% if active=='config' %}active{% endif %}">config</a>
      <a href="/docs" target="_blank">api</a>
    </nav>
    <div class="topbar-status"
         hx-get="/ui/partial/status"
         hx-trigger="load, every 5s"
         hx-swap="innerHTML">
      <span class="status-key">stato</span>
      <span class="status-val">—</span>
    </div>
  </header>

  <!-- MAIN -->
  <main class="main">
    {% block content %}{% endblock %}
  </main>

</div>
</body>
</html>
