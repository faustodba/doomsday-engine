<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Doomsday V6{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/htmx.min.js" defer></script>
  <!-- json-enc inline: parse 'sezione[campo]' → nested object + coerce + JSON serialize
       per form con hx-ext="json-enc" (l'estensione non è shipped, ricostruiamo qui) -->
  <script defer>
    document.addEventListener('htmx:configRequest', function(evt) {
      var p = evt.detail.parameters;
      if (!p || typeof p !== 'object' || typeof p === 'string') return;
      var elt = evt.detail.elt;
      var isJsonEnc = elt && elt.closest && elt.closest('[hx-ext~="json-enc"], [hx-ext*="json-enc"]');
      var nested = {};
      Object.keys(p).forEach(function(k) {
        var m = k.match(/^([^\[]+)\[([^\]]+)\]$/);
        var v = p[k];
        // coerce common strings (true/false/numeric)
        if (v === 'true') v = true;
        else if (v === 'false') v = false;
        else if (typeof v === 'string' && v.trim() !== '' && /^-?\d+(\.\d+)?$/.test(v)) {
          v = parseFloat(v);
        }
        if (m) {
          if (!nested[m[1]]) nested[m[1]] = {};
          nested[m[1]][m[2]] = v;
        } else {
          nested[k] = v;
        }
      });
      if (isJsonEnc) {
        evt.detail.headers['Content-Type'] = 'application/json';
        evt.detail.parameters = JSON.stringify(nested);
      } else {
        evt.detail.parameters = nested;
      }
    });
  </script>
</head>
<body>
<div class="layout">

  <!-- TOPBAR -->
  <header class="topbar">
    <span class="topbar-logo">⬡ DOOMSDAY V6</span>
    <span class="env-badge {{ env_css }}">{{ env_label }}</span>
    {% if not env_is_prod %}
    <span class="env-warn">⚠ dati di test — non produzione</span>
    {% endif %}
    <nav class="topbar-nav">
      <a href="/ui" class="{% if active=='home' %}active{% endif %}">home</a>
      <a href="/ui/advanced" class="{% if active=='advanced' %}active{% endif %}">advanced</a>
      <a href="/ui/telemetria" class="{% if active=='telemetria' %}active{% endif %}">telemetria</a>
      <a href="/ui/predictor-istanze" class="{% if active=='predictor' %}active{% endif %}">predictor istanze</a>
      <a href="/ui/ab-test" class="{% if active=='ab_test' %}active{% endif %}">ab test</a>
      <a href="/ui/config/global" class="{% if active=='global' %}active{% endif %}">config</a>
      <a href="/docs" target="_blank">api</a>
    </nav>
    <div class="topbar-counters"
         hx-get="/ui/partial/status-inline"
         hx-trigger="load, every 5s"
         hx-swap="innerHTML">
      <span class="cnt">stato <b>—</b></span>
    </div>
  </header>

  <div class="rbar"><div class="rbar-inner"></div></div>

  <!-- WU51 — banner manutenzione (sempre visibile, polling 5s) -->
  <div id="maint-banner"
       style="padding:6px 20px;max-width:1600px;margin:0 auto"
       hx-get="/ui/partial/maintenance-banner"
       hx-trigger="load, every 5s"
       hx-swap="innerHTML">
  </div>

  <!-- 06/05 — banner restart bot pendente (visibile solo se richiesta attiva) -->
  <div id="restart-banner"
       style="padding:0 20px;max-width:1600px;margin:0 auto"
       hx-get="/ui/partial/restart-banner"
       hx-trigger="load, every 10s"
       hx-swap="innerHTML">
  </div>

  <!-- MAIN -->
  <main class="main">
    {% block content %}{% endblock %}
  </main>

  <script>
    // WU51 — toggle modalità manutenzione
    async function maintenanceToggle(activate) {
      try {
        if (activate) {
          const motivo = prompt('Motivo manutenzione (opzionale):', 'aggiornamento');
          if (motivo === null) return;  // cancelled
          const r = await fetch('/api/maintenance/start', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({motivo: motivo || ''}),
          });
          if (!r.ok) throw new Error('HTTP ' + r.status);
        } else {
          if (!confirm('Disattivare modalità manutenzione e riprendere il bot?')) return;
          const r = await fetch('/api/maintenance/stop', {method: 'POST'});
          if (!r.ok) throw new Error('HTTP ' + r.status);
        }
        // Refresh immediato banner
        if (typeof htmx !== 'undefined') {
          htmx.ajax('GET', '/ui/partial/maintenance-banner',
                    {target: '#maint-banner', swap: 'innerHTML'});
        }
      } catch (err) {
        alert('Errore: ' + err.message);
      }
    }

    // 08/05 — save controlli card istanza (real-time → dynamic)
    async function saveCardCtrl(btn, nome) {
      const card = btn.closest('.card');
      if (!card) return;
      const msgEl = card.querySelector('.ic-msg');
      const setMsg = (txt, color) => {
        if (!msgEl) return;
        msgEl.textContent = txt;
        msgEl.style.color = color || '#888';
      };
      setMsg('salvataggio...', '#0066cc');
      const payload = {
        abilitata:                 card.querySelector('.ic-on').checked,
        raccolta_fuori_territorio: card.querySelector('.ic-ft').checked,
        tipologia:                 card.querySelector('.ic-tip').value,
        truppe:                    parseInt(card.querySelector('.ic-tr').value || '0', 10),
        livello:                   parseInt(card.querySelector('.ic-lv').value || '7', 10),
        max_squadre:               parseInt(card.querySelector('.ic-sq').value || '4', 10),
      };
      try {
        const r = await fetch('/api/config/overrides/istanze/' + encodeURIComponent(nome), {
          method: 'PATCH',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(payload),
        });
        const j = await r.json().catch(() => ({}));
        if (r.ok) {
          setMsg('✓ salvato (effetto al prossimo tick)', '#0a8000');
          // Refresh container produzione-istanze preservando scroll position
          if (typeof htmx !== 'undefined') {
            const scrollY = window.scrollY || window.pageYOffset || 0;
            // Listener one-shot per ripristinare scroll dopo lo swap
            const restoreScroll = function(evt) {
              if (evt.detail && evt.detail.target && evt.detail.target.id === 'prod-istanze') {
                window.scrollTo(0, scrollY);
                document.removeEventListener('htmx:afterSwap', restoreScroll);
              }
            };
            document.addEventListener('htmx:afterSwap', restoreScroll);
            setTimeout(() => htmx.ajax('GET', '/ui/partial/produzione-istanze',
              {target: '#prod-istanze', swap: 'innerHTML'}), 800);
          }
        } else {
          setMsg('✗ ' + (j.detail || 'errore'), '#c00');
        }
      } catch (e) {
        setMsg('✗ ' + e.message, '#c00');
      }
    }

    // 08/05 — Pausa auto-refresh produzione-istanze quando l'utente sta
    // editando un controllo card (preserva valori che sta digitando).
    // Il prossimo trigger ciclico riprenderà normalmente quando il focus
    // esce dai controlli.
    document.addEventListener('htmx:beforeRequest', function(evt) {
      try {
        const target = evt.detail && evt.detail.target;
        const elt    = evt.detail && evt.detail.elt;
        // Vincoliamo SOLO al refresh di prod-istanze, non altri pannelli
        if (target && target.id === 'prod-istanze') {
          // Skip se un input/select dei controlli card-ctrl è in focus
          const focused = document.activeElement;
          if (focused && (focused.tagName === 'INPUT' || focused.tagName === 'SELECT')) {
            const inCtrl = focused.closest('.card-ctrl');
            if (inCtrl) {
              evt.preventDefault();   // cancella questo tick di refresh
              return;
            }
          }
        }
      } catch (e) { /* failsafe — non bloccare htmx */ }
    });

    // 06/05 — toggle richiesta restart bot
    async function restartBotToggle(request) {
      try {
        if (request) {
          if (!confirm('Richiedere restart bot al PROSSIMO fine ciclo?\n\nIl bot uscirà con exit code 100 e run_prod.bat lo riavvierà automaticamente fra 5s.\nNessun tick verrà interrotto.')) return;
          const r = await fetch('/api/restart-bot', {method: 'POST'});
          if (!r.ok) throw new Error('HTTP ' + r.status);
        } else {
          if (!confirm('Cancellare la richiesta di restart pendente?')) return;
          const r = await fetch('/api/restart-bot', {method: 'DELETE'});
          if (!r.ok) throw new Error('HTTP ' + r.status);
        }
        if (typeof htmx !== 'undefined') {
          htmx.ajax('GET', '/ui/partial/restart-banner',
                    {target: '#restart-banner', swap: 'innerHTML'});
        }
      } catch (err) {
        alert('Errore: ' + err.message);
      }
    }
  </script>

</div>
</body>
</html>
